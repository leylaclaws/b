<!DOCTYPE html>
<html>
<head>
    <title>Flappy Browser</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { border: 4px solid #fff; background: #70c5ce; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { position: absolute; color: white; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div class="ui">
        <h1 id="msg">Press SPACE to Jump</h1>
        <h2 id="score">Score: 0</h2>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgEl = document.getElementById('msg');
    const scoreEl = document.getElementById('score');

    // Game Settings
    canvas.width = 400;
    canvas.height = 600;
    let gravity = 0.25;
    let velocity = 0;
    let birdY = 300;
    let birdX = 50;
    let pipeGap = 150;
    let pipeWidth = 50;
    let pipes = [];
    let score = 0;
    let gameActive = false;

    function resetGame() {
        birdY = 300;
        velocity = 0;
        pipes = [];
        score = 0;
        gameActive = true;
        msgEl.innerHTML = "";
        scoreEl.innerHTML = "Score: 0";
        // Spawn first pipe
        spawnPipe();
    }

    function spawnPipe() {
        let minPipeHeight = 50;
        let randomHeight = Math.floor(Math.random() * (canvas.height - pipeGap - (minPipeHeight * 2))) + minPipeHeight;
        pipes.push({
            x: canvas.width,
            top: randomHeight,
            passed: false
        });
    }

    function update() {
        if (!gameActive) return;

        // Bird Physics
        velocity += gravity;
        birdY += velocity;

        // Pipe Movement
        if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
            spawnPipe();
        }

        pipes.forEach((pipe, index) => {
            pipe.x -= 3;

            // Collision Detection
            if (birdX + 20 > pipe.x && birdX - 20 < pipe.x + pipeWidth) {
                if (birdY - 15 < pipe.top || birdY + 15 > pipe.top + pipeGap) {
                    gameOver();
                }
            }

            // Score Increment
            if (!pipe.passed && pipe.x < birdX) {
                score++;
                scoreEl.innerHTML = `Score: ${score}`;
                pipe.passed = true;
            }

            // Remove old pipes
            if (pipe.x + pipeWidth < 0) pipes.splice(index, 1);
        });

        // Floor/Ceiling Hit
        if (birdY > canvas.height || birdY < 0) gameOver();
    }

    function draw() {
        // Clear Canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Pipes
        ctx.fillStyle = "#2ecc71";
        pipes.forEach(pipe => {
            // Top Pipe
            ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
            // Bottom Pipe
            ctx.fillRect(pipe.x, pipe.top + pipeGap, pipeWidth, canvas.height);
        });

        // Draw Bird
        ctx.fillStyle = "#f1c40f";
        ctx.beginPath();
        ctx.arc(birdX, birdY, 15, 0, Math.PI * 2);
        ctx.fill();
        
        // Eye
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(birdX + 7, birdY - 5, 3, 0, Math.PI * 2);
        ctx.fill();
    }

    function gameOver() {
        gameActive = false;
        msgEl.innerHTML = "GAME OVER<br>Press SPACE to Restart";
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            if (!gameActive) {
                resetGame();
            } else {
                velocity = -6;
            }
        }
    });

    // Start the loop
    loop();
</script>
</body>
</html>
